<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- 배경: 파스텔 핑크→민트 그라데이션 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe4ee"/>
      <stop offset="1" stop-color="#e0fff4"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d1ecff"/>
      <stop offset="1" stop-color="#b8dfff"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="22" fill="url(#bg)"/>

  <!-- 배경 데코: 작은 점들 -->
  <circle cx="28" cy="28" r="3" fill="#ffc9dd"/>
  <circle cx="292" cy="38" r="2.5" fill="#b8f5e0"/>
  <circle cx="282" cy="172" r="3" fill="#d9c7ff"/>
  <circle cx="38" cy="176" r="2.2" fill="#ffc9dd"/>
  <circle cx="300" cy="100" r="2" fill="#ffeec2"/>
  <circle cx="18" cy="100" r="2" fill="#d9c7ff"/>

  <!-- 작은 별 데코 -->
  <path d="M 50,45 L 52,50 L 57,50 L 53,53 L 55,58 L 50,55 L 45,58 L 47,53 L 43,50 L 48,50 Z"
        fill="#ffc9dd" opacity="0.7"/>
  <path d="M 270,150 L 272,155 L 277,155 L 273,158 L 275,163 L 270,160 L 265,163 L 267,158 L 263,155 L 268,155 Z"
        fill="#b8f5e0" opacity="0.7"/>

  <!-- 에어하키 테이블 -->
  <rect x="60" y="55" width="200" height="90" rx="14"
        fill="url(#tableGrad)" stroke="#86c9ff" stroke-width="2"/>

  <!-- 센터라인 (점선) -->
  <line x1="160" y1="60" x2="160" y2="140" stroke="#86c9ff" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- 중앙 원 -->
  <circle cx="160" cy="100" r="16" fill="none" stroke="#86c9ff" stroke-width="1.5" opacity="0.7"/>

  <!-- 골대 표시 (양쪽) -->
  <rect x="56" y="82" width="4" height="36" rx="2" fill="#ff82ac" opacity="0.8"/>
  <rect x="260" y="82" width="4" height="36" rx="2" fill="#ff82ac" opacity="0.8"/>

  <!-- 말렛 1 (왼쪽, 고양이귀 핑크) -->
  <g transform="translate(100, 100)">
    <!-- 귀 (뾰족) -->
    <path d="M -10,-10 L -6,-19 L -2,-10 Z" fill="#ff82ac"/>
    <path d="M 2,-10 L 6,-19 L 10,-10 Z" fill="#ff82ac"/>
    <!-- 말렛 몸통 -->
    <circle r="13" fill="#ff82ac" stroke="#ff5a92" stroke-width="1"/>
    <!-- 손잡이 -->
    <circle r="5" fill="#ffd6e4"/>
  </g>

  <!-- 말렛 2 (오른쪽, 곰귀 라벤더) -->
  <g transform="translate(220, 100)">
    <!-- 귀 (둥근) -->
    <circle cx="-9" cy="-10" r="5" fill="#b89aff" stroke="#9c7aeb" stroke-width="1"/>
    <circle cx="9" cy="-10" r="5" fill="#b89aff" stroke="#9c7aeb" stroke-width="1"/>
    <!-- 말렛 몸통 -->
    <circle r="13" fill="#b89aff" stroke="#9c7aeb" stroke-width="1"/>
    <!-- 손잡이 -->
    <circle r="5" fill="#e5d9ff"/>
  </g>

  <!-- 퍽 (하트 모양) -->
  <g transform="translate(160, 100)">
    <path d="M 0,5 C -9,-3 -9,-11 -4.5,-11 C -2,-11 0,-9 0,-7 C 0,-9 2,-11 4.5,-11 C 9,-11 9,-3 0,5 Z"
          fill="#ff5a92" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- 퍽 움직임 라인 (속도감) -->
  <path d="M 140,100 Q 150,100 156,100" stroke="#ffa8c7" stroke-width="2" stroke-linecap="round" opacity="0.6" stroke-dasharray="2 3"/>
</svg>
