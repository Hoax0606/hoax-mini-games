<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- 배경 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe4ee"/>
      <stop offset="1" stop-color="#e0fff4"/>
    </linearGradient>
    <radialGradient id="targetGreen" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#a8f5c8"/>
      <stop offset="1" stop-color="#5dc9a7"/>
    </radialGradient>
  </defs>

  <rect width="320" height="200" rx="22" fill="url(#bg)"/>

  <!-- 배경 점 데코 4개 -->
  <circle cx="30" cy="28" r="3" fill="#ffc9dd"/>
  <circle cx="292" cy="38" r="2.5" fill="#b8f5e0"/>
  <circle cx="296" cy="172" r="3" fill="#d9c7ff"/>
  <circle cx="28" cy="174" r="2.2" fill="#ffeec2"/>

  <!-- 별 데코 2개 -->
  <path d="M 52 56 L 54 61 L 59 61 L 55 64 L 57 69 L 52 66 L 47 69 L 49 64 L 45 61 L 50 61 Z"
        fill="#ffc9dd" opacity="0.8"/>
  <path d="M 270 140 L 272 145 L 277 145 L 273 148 L 275 153 L 270 150 L 265 153 L 267 148 L 263 145 L 268 145 Z"
        fill="#b8f5e0" opacity="0.8"/>

  <!-- 중앙 큰 초록 원 (GO 상태) -->
  <g transform="translate(160 100)">
    <!-- 펄스 링 -->
    <circle r="62" fill="none" stroke="#86e8c4" stroke-width="2" opacity="0.35"/>
    <circle r="54" fill="none" stroke="#86e8c4" stroke-width="2" opacity="0.55"/>
    <!-- 본체 -->
    <circle r="46" fill="url(#targetGreen)" stroke="#2e8a70" stroke-width="2"/>
    <!-- 상단 광택 -->
    <ellipse cx="-14" cy="-18" rx="14" ry="8" fill="rgba(255,255,255,0.55)"/>
    <!-- 중앙 번개 심볼 -->
    <path d="M -4 -18 L -16 4 L -2 4 L -6 22 L 16 -4 L 2 -4 L 6 -18 Z"
          fill="#fff"
          stroke="#2e8a70" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <!-- 좌측 mini "빨강 대기" 원 -->
  <g transform="translate(50 150)">
    <circle r="18" fill="#ff82ac" stroke="#c93d73" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
          font-size="12" font-weight="800" fill="#fff">...</text>
  </g>

  <!-- 우측 mini "숫자" ms 표시 -->
  <g transform="translate(270 55)">
    <rect x="-28" y="-13" width="56" height="26" rx="13"
          fill="#fff" stroke="#9c7aeb" stroke-width="1.4"/>
    <text x="0" y="5" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
          font-size="12" font-weight="900" fill="#9c7aeb">182ms</text>
  </g>
</svg>
