<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- 배경: 다른 게임과 같은 톤 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe4ee"/>
      <stop offset="1" stop-color="#e0fff4"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="22" fill="url(#bg)"/>

  <!-- 배경 점 데코 -->
  <circle cx="28" cy="28" r="3" fill="#ffc9dd"/>
  <circle cx="292" cy="38" r="2.5" fill="#b8f5e0"/>
  <circle cx="296" cy="172" r="3" fill="#d9c7ff"/>
  <circle cx="28" cy="174" r="2.2" fill="#ffeec2"/>

  <!-- 별 데코 -->
  <path d="M 50,48 L 52,52 L 57,52 L 53,55 L 55,60 L 50,57 L 45,60 L 47,55 L 43,52 L 48,52 Z"
        fill="#ffc9dd" opacity="0.7"/>
  <path d="M 270,150 L 272,154 L 277,154 L 273,157 L 275,162 L 270,159 L 265,162 L 267,157 L 263,154 L 268,154 Z"
        fill="#b8f5e0" opacity="0.7"/>

  <!-- 중앙 다트보드 (20 세그먼트 파이 배치) -->
  <g transform="translate(160 100)">
    <!-- 외곽 검정 링 (실제 다트판 느낌) -->
    <circle r="74" fill="#000000" stroke="#000000" stroke-width="1.5"/>

    <!-- Single 영역 20 세그먼트: cream/lavender 짝·홀 교차.
         각 세그먼트 = 안쪽 r=10 부터 바깥 r=64 까지 18도 부채꼴. -->
    <g stroke="#000000" stroke-width="0.5" stroke-linejoin="round">
      <path fill="#fff6e4" d="M -1.56 -9.88 L -9.98 -63.22 A 64 64 0 0 1 9.98 -63.22 L 1.56 -9.88 A 10 10 0 0 0 -1.56 -9.88 Z"/>
      <path fill="#e9dfff" d="M 1.56 -9.88 L 9.98 -63.22 A 64 64 0 0 1 29.06 -57.02 L 4.54 -8.91 A 10 10 0 0 0 1.56 -9.88 Z"/>
      <path fill="#fff6e4" d="M 4.54 -8.91 L 29.06 -57.02 A 64 64 0 0 1 45.25 -45.25 L 7.07 -7.07 A 10 10 0 0 0 4.54 -8.91 Z"/>
      <path fill="#e9dfff" d="M 7.07 -7.07 L 45.25 -45.25 A 64 64 0 0 1 57.02 -29.06 L 8.91 -4.54 A 10 10 0 0 0 7.07 -7.07 Z"/>
      <path fill="#fff6e4" d="M 8.91 -4.54 L 57.02 -29.06 A 64 64 0 0 1 63.22 -9.98 L 9.88 -1.56 A 10 10 0 0 0 8.91 -4.54 Z"/>
      <path fill="#e9dfff" d="M 9.88 -1.56 L 63.22 -9.98 A 64 64 0 0 1 63.22 9.98 L 9.88 1.56 A 10 10 0 0 0 9.88 -1.56 Z"/>
      <path fill="#fff6e4" d="M 9.88 1.56 L 63.22 9.98 A 64 64 0 0 1 57.02 29.06 L 8.91 4.54 A 10 10 0 0 0 9.88 1.56 Z"/>
      <path fill="#e9dfff" d="M 8.91 4.54 L 57.02 29.06 A 64 64 0 0 1 45.25 45.25 L 7.07 7.07 A 10 10 0 0 0 8.91 4.54 Z"/>
      <path fill="#fff6e4" d="M 7.07 7.07 L 45.25 45.25 A 64 64 0 0 1 29.06 57.02 L 4.54 8.91 A 10 10 0 0 0 7.07 7.07 Z"/>
      <path fill="#e9dfff" d="M 4.54 8.91 L 29.06 57.02 A 64 64 0 0 1 9.98 63.22 L 1.56 9.88 A 10 10 0 0 0 4.54 8.91 Z"/>
      <path fill="#fff6e4" d="M 1.56 9.88 L 9.98 63.22 A 64 64 0 0 1 -9.98 63.22 L -1.56 9.88 A 10 10 0 0 0 1.56 9.88 Z"/>
      <path fill="#e9dfff" d="M -1.56 9.88 L -9.98 63.22 A 64 64 0 0 1 -29.06 57.02 L -4.54 8.91 A 10 10 0 0 0 -1.56 9.88 Z"/>
      <path fill="#fff6e4" d="M -4.54 8.91 L -29.06 57.02 A 64 64 0 0 1 -45.25 45.25 L -7.07 7.07 A 10 10 0 0 0 -4.54 8.91 Z"/>
      <path fill="#e9dfff" d="M -7.07 7.07 L -45.25 45.25 A 64 64 0 0 1 -57.02 29.06 L -8.91 4.54 A 10 10 0 0 0 -7.07 7.07 Z"/>
      <path fill="#fff6e4" d="M -8.91 4.54 L -57.02 29.06 A 64 64 0 0 1 -63.22 9.98 L -9.88 1.56 A 10 10 0 0 0 -8.91 4.54 Z"/>
      <path fill="#e9dfff" d="M -9.88 1.56 L -63.22 9.98 A 64 64 0 0 1 -63.22 -9.98 L -9.88 -1.56 A 10 10 0 0 0 -9.88 1.56 Z"/>
      <path fill="#fff6e4" d="M -9.88 -1.56 L -63.22 -9.98 A 64 64 0 0 1 -57.02 -29.06 L -8.91 -4.54 A 10 10 0 0 0 -9.88 -1.56 Z"/>
      <path fill="#e9dfff" d="M -8.91 -4.54 L -57.02 -29.06 A 64 64 0 0 1 -45.25 -45.25 L -7.07 -7.07 A 10 10 0 0 0 -8.91 -4.54 Z"/>
      <path fill="#fff6e4" d="M -7.07 -7.07 L -45.25 -45.25 A 64 64 0 0 1 -29.06 -57.02 L -4.54 -8.91 A 10 10 0 0 0 -7.07 -7.07 Z"/>
      <path fill="#e9dfff" d="M -4.54 -8.91 L -29.06 -57.02 A 64 64 0 0 1 -9.98 -63.22 L -1.56 -9.88 A 10 10 0 0 0 -4.54 -8.91 Z"/>
    </g>

    <!-- Double 링 (Single 외곽 바로 바깥, pink 교차 대신 단일 링 — 썸네일 단순화) -->
    <circle r="70" fill="none" stroke="#ff82ac" stroke-width="6"/>

    <!-- Triple 링 -->
    <circle r="38" fill="none" stroke="#86e8c4" stroke-width="4"/>

    <!-- Bull -->
    <circle r="10" fill="#86e8c4" stroke="#2e8a70" stroke-width="1"/>
    <circle r="5" fill="#ff82ac" stroke="#c93d73" stroke-width="1"/>
  </g>

  <!-- 꽂힌 다트 2개 (과녁에 박힌 모습). in-game 과 같은 4단 구조 (팁·배럴·샤프트·플라이트) -->
  <!-- 다트 1: 불스아이 근처 -->
  <g transform="translate(165 95) rotate(28)">
    <!-- 플라이트 (뒷깃 2개) -->
    <path d="M 0,-22 Q -8,-23 -7.5,-14 L 0,-14 Z" fill="#b89aff" stroke="#9c7aeb" stroke-width="0.5"/>
    <path d="M 0,-22 Q 8,-23 7.5,-14 L 0,-14 Z" fill="#ff82ac" stroke="#c93d73" stroke-width="0.5"/>
    <!-- 샤프트 -->
    <rect x="-0.7" y="-14" width="1.4" height="4" fill="#faf7e6" stroke="#8a7a8a" stroke-width="0.3"/>
    <!-- 배럴 + grip -->
    <polygon points="-0.7,-10 -2.6,-9 -2.6,-3 -0.7,-1.5 0.7,-1.5 2.6,-3 2.6,-9 0.7,-10"
             fill="#6e5872" stroke="#3a2a3a" stroke-width="0.4"/>
    <line x1="-2.2" y1="-8" x2="2.2" y2="-8" stroke="#1e1620" stroke-width="0.3" opacity="0.6"/>
    <line x1="-2.2" y1="-6" x2="2.2" y2="-6" stroke="#1e1620" stroke-width="0.3" opacity="0.6"/>
    <line x1="-2.2" y1="-4" x2="2.2" y2="-4" stroke="#1e1620" stroke-width="0.3" opacity="0.6"/>
    <!-- 팁 -->
    <polygon points="-1.1,-1.5 1.1,-1.5 0,4" fill="#1c1820"/>
  </g>

  <!-- 다트 2: 트리플 영역 -->
  <g transform="translate(140 80) rotate(-15)">
    <path d="M 0,-22 Q -8,-23 -7.5,-14 L 0,-14 Z" fill="#ffd454" stroke="#c49a1f" stroke-width="0.5"/>
    <path d="M 0,-22 Q 8,-23 7.5,-14 L 0,-14 Z" fill="#86e8c4" stroke="#2e8a70" stroke-width="0.5"/>
    <rect x="-0.7" y="-14" width="1.4" height="4" fill="#faf7e6" stroke="#8a7a8a" stroke-width="0.3"/>
    <polygon points="-0.7,-10 -2.6,-9 -2.6,-3 -0.7,-1.5 0.7,-1.5 2.6,-3 2.6,-9 0.7,-10"
             fill="#6e5872" stroke="#3a2a3a" stroke-width="0.4"/>
    <line x1="-2.2" y1="-8" x2="2.2" y2="-8" stroke="#1e1620" stroke-width="0.3" opacity="0.6"/>
    <line x1="-2.2" y1="-6" x2="2.2" y2="-6" stroke="#1e1620" stroke-width="0.3" opacity="0.6"/>
    <line x1="-2.2" y1="-4" x2="2.2" y2="-4" stroke="#1e1620" stroke-width="0.3" opacity="0.6"/>
    <polygon points="-1.1,-1.5 1.1,-1.5 0,4" fill="#1c1820"/>
  </g>

  <!-- 우측 하단 "스코어" 풍선 -->
  <g transform="translate(260 160)">
    <rect x="-30" y="-14" width="60" height="28" rx="14"
          fill="#fff" stroke="#9c7aeb" stroke-width="1.4"/>
    <text x="0" y="5" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
          font-size="13" font-weight="900" fill="#9c7aeb">180!</text>
  </g>
</svg>
